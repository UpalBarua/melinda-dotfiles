# ========================
# General settings
# ========================
set -g default-terminal "tmux-256color"
set-option -a terminal-features 'alacritty:RGB'
set -g mouse on
set -g detach-on-destroy off

# ========================
# Prefix key (Ctrl+A instead of Ctrl+B)
# ========================
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ========================
# Window & pane numbering (start at 1)
# ========================
set -g pane-base-index 1
set -g base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# ========================
# Key bindings
# ========================
# Shift arrow to switch windows
bind -n S-Left  previous-window
bind -n S-Right next-window

# Shift Alt vim keys to switch windows
bind -n M-H previous-window
bind -n M-L next-window

# Create new windows/panes in current path
bind c new-window -c "#{pane_current_path}"
bind '"' split-window -v -c '#{pane_current_path}'
bind '%' split-window -h -c '#{pane_current_path}'

# Kill pane without confirmation
bind-key x kill-pane

# Popup lazygit
bind-key g display-popup -w 90% -h 90% -E "lazygit"

# ========================
# Plugin manager (TPM)
# ========================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Tell TPM where to install plugins (writable location)
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.tmux/plugins/tpm'

# Continuum restore on start
set -g @continuum-restore 'on'

# Initialize TPM
run '~/.tmux/plugins/tpm/tpm'

# ========================
# Color theme (Rose Pine)
# ========================
set -g @bg '#191724'
set -g @fg '#e0def4'
set -g @ac '#f6c177'
set -g @bd '#26233a'

# ========================
# Pane borders
# ========================
set -g pane-border-lines 'simple'
set -g pane-border-style 'fg=#{@fg},bright'
set -g pane-active-border-style 'fg=#{@fg}'

# ========================
# Status bar
# ========================
set -g status-position 'top'
set -g status-bg 'default'
set -g status-style 'fg=#{@fg}'
set -g status-left ''
set -g status-right ' 󰆧 #S '

set -g window-status-format ' #W '
set -g window-status-current-format ' #W '
set -g window-status-bell-style 'bg=red,nobold'
set -g window-status-current-style "fg=#{@ac},bg=#{?window_zoomed_flag,red,#{@bd}},nobold"

# ========================
# Sesh integration (session picker)
# ========================
bind-key "T" run-shell "sesh connect \"$(
  sesh list --icons | fzf-tmux -p 80%,70% \
    --no-sort --ansi --border-label ' sesh ' --prompt '⚡  ' \
    --header '  ^a all ^t tmux ^g configs ^x zoxide ^d tmux kill ^f find' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-a:change-prompt(⚡  )+reload(sesh list --icons)' \
    --bind 'ctrl-t:change-prompt(🪟  )+reload(sesh list -t --icons)' \
    --bind 'ctrl-g:change-prompt(⚙️  )+reload(sesh list -c --icons)' \
    --bind 'ctrl-x:change-prompt(📁  )+reload(sesh list -z --icons)' \
    --bind 'ctrl-f:change-prompt(🔎  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(⚡  )+reload(sesh list --icons)' \
    --preview-window 'right:55%' \
    --preview 'sesh preview {}'
)\""
